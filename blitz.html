<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Port Blitz</title>
<style>
  :root{
    --bg1:#04241a;--bg2:#0f5c3f;--bg3:#1f9e6e;
    --card:#0c3327;--line:rgba(255,255,255,0.16);
    --text:#eafff5;--muted:#a8ddc4;
    --good:#2ecc71;--bad:#ff6b5e;--accent:#ffd166;
  }
  *{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;font-family:"Segoe UI",Inter,Arial,sans-serif;color:var(--text);
    background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 120%);
    padding:24px 16px 60px;
  }
  .wrap{max-width:680px;margin:0 auto}
  a.back{color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:600}
  a.back:hover{color:var(--text)}
  h1{margin:6px 0 4px;font-size:clamp(24px,3.6vw,32px)}
  .sub{color:var(--muted);font-size:14px;margin-bottom:18px;max-width:700px;line-height:1.55}
  .card{
    background:rgba(0,0,0,0.24);border:1px solid var(--line);border-radius:16px;
    padding:22px;margin-bottom:18px;box-shadow:0 10px 26px rgba(0,0,0,0.3);
  }
  .howto{font-size:13.5px;line-height:1.7;color:var(--muted)}
  .howto strong{color:var(--text)}
  .howto ol{margin:8px 0 0;padding-left:20px}
  button{
    font-family:inherit;font-weight:800;font-size:14px;border:0;border-radius:999px;
    padding:12px 22px;cursor:pointer;background:var(--accent);color:#3a2600;
  }
  button:hover{filter:brightness(1.06)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--text);font-size:13.5px;padding:10px 18px}
  .hud{display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;font-size:14px;color:var(--muted);margin-bottom:14px}
  .hud b{color:var(--text);font-size:20px}
  .timer{font-weight:800;font-size:20px;color:var(--accent)}
  .timer.low{color:var(--bad)}
  .protocol-display{text-align:center;padding:20px 10px 26px}
  .protocol-display .label{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.08em}
  .protocol-display .name{font-size:34px;font-weight:800;line-height:1.2;color:var(--accent)}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:480px){
    .choices{grid-template-columns:1fr}
    body{padding:16px 10px 50px}
    .card{padding:16px}
    .protocol-display .name{font-size:26px}
    .choice{padding:14px;font-size:18px}
    button{padding:10px 16px;font-size:13px}
  }
  .choice{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:16px;color:var(--text);font-size:20px;font-weight:800;cursor:pointer;text-align:center;
    transition:transform .1s ease, border-color .12s ease;
  }
  .choice:hover{transform:translateY(-2px);border-color:var(--accent)}
  .choice.correct-flash{background:rgba(46,204,113,0.35);border-color:var(--good)}
  .choice.wrong-flash{background:rgba(255,107,94,0.35);border-color:var(--bad)}
  .center{text-align:center}
  .score-big{font-size:52px;font-weight:800}
  .score-sub{color:var(--muted);font-size:14px;margin-top:4px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; Back to Game Hub</a>
  <h1>⚡ Port Blitz</h1>
  <div class="sub">The bonus speed round. A protocol flashes on screen &mdash; tap its port number as fast as you can before time runs out.</div>

  <div id="app"></div>

  <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:14px">For educational purposes only &mdash; not affiliated with or endorsed by CompTIA.</p>
</div>

<script src="data.js"></script>
<script>
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const STORAGE_KEY = "portblitz_session_v1";
const app = document.getElementById("app");
const GAME_SECONDS = 60;
let timeLeft = GAME_SECONDS;
let score = 0;
let streak = 0;
let bestStreak = 0;
let round = 0;
let timerHandle = null;
let currentEntry = null;
let currentChoices = [];
let locked = false;

function saveSession(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    v: 1, timeLeft, score, streak, bestStreak, round, currentEntry, currentChoices
  }));
}
function loadSession(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(s && s.v === 1) return s;
  }catch(e){}
  return null;
}
function clearSession(){
  localStorage.removeItem(STORAGE_KEY);
}

function renderIntro(){
  const existing = loadSession();
  app.innerHTML = `
    ${existing ? `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
          <div style="font-size:14px">
            <strong>Blitz in progress</strong> &mdash; ${existing.timeLeft}s left, score ${existing.score}.
          </div>
          <div style="display:flex;gap:10px">
            <button id="resumeBtn">Resume Blitz</button>
            <button class="ghost" id="discardBtn">Discard</button>
          </div>
        </div>
      </div>` : ``}
    <div class="card howto">
      <strong>How to play</strong>
      <ol>
        <li>You have <strong>60 seconds</strong>.</li>
        <li>A protocol name appears &mdash; tap the card with its correct port number.</li>
        <li>Correct = +10 points and the streak bonus grows; wrong just resets your streak, no time penalty.</li>
        <li>Answer as many as you can before the clock hits zero.</li>
        <li>You can pause mid-round &mdash; the clock stops and picks up right where you left it.</li>
      </ol>
    </div>
    <div class="card center">
      <button id="startBtn">Start 60-Second Blitz</button>
    </div>
  `;
  document.getElementById("startBtn").addEventListener("click", startGame);
  if(existing){
    document.getElementById("resumeBtn").addEventListener("click", () => {
      timeLeft = existing.timeLeft;
      score = existing.score;
      streak = existing.streak;
      bestStreak = existing.bestStreak;
      round = existing.round;
      currentEntry = existing.currentEntry;
      currentChoices = existing.currentChoices;
      locked = false;
      renderGame();
      runTimer();
    });
    document.getElementById("discardBtn").addEventListener("click", () => {
      clearSession();
      renderIntro();
    });
  }
}

function runTimer(){
  timerHandle = setInterval(() => {
    timeLeft--;
    if(timeLeft <= 0){
      timeLeft = 0;
      clearInterval(timerHandle);
      renderGameOver();
      return;
    }
    updateHud();
  }, 1000);
}

function startGame(){
  clearSession();
  timeLeft = GAME_SECONDS;
  score = 0;
  streak = 0;
  bestStreak = 0;
  round = 0;
  locked = false;
  nextRound();
  renderGame();
  runTimer();
}

function pauseAndSave(){
  clearInterval(timerHandle);
  saveSession();
  window.location.href = "index.html";
}

function nextRound(){
  round++;
  currentEntry = PORT_DATA[Math.floor(Math.random()*PORT_DATA.length)];
  const others = shuffle(PORT_DATA.filter(p => p.port !== currentEntry.port)).slice(0,3);
  currentChoices = shuffle([currentEntry, ...others]);
  locked = false;
}

function renderGame(){
  app.innerHTML = `
    <div class="card">
      <div class="hud">
        <span>Score: <b id="scoreHud">${score}</b></span>
        <span>Streak: <b id="streakHud">${streak}</b></span>
        <span class="timer" id="timerHud">${timeLeft}s</span>
      </div>
      <div class="protocol-display">
        <div class="label">Which port is used by</div>
        <div class="name" id="protoName">${currentEntry.protocol}</div>
      </div>
      <div class="choices" id="choicesWrap"></div>
      <div style="text-align:center;margin-top:16px">
        <button class="ghost" id="pauseBtn">Pause &amp; Save</button>
      </div>
    </div>
  `;
  const wrap = document.getElementById("choicesWrap");
  currentChoices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = c.port;
    btn.addEventListener("click", () => onChoice(c, btn));
    wrap.appendChild(btn);
  });
  document.getElementById("pauseBtn").addEventListener("click", pauseAndSave);
}

function onChoice(choice, btn){
  if(locked) return;
  locked = true;
  const correct = choice.port === currentEntry.port;
  if(correct){
    streak++;
    bestStreak = Math.max(bestStreak, streak);
    const bonus = Math.min(streak, 5);
    score += 10 + bonus;
    btn.classList.add("correct-flash");
  } else {
    streak = 0;
    btn.classList.add("wrong-flash");
  }
  updateHud();
  setTimeout(() => {
    if(timeLeft > 0){
      nextRound();
      renderGame();
    }
  }, 260);
}

function updateHud(){
  const scoreEl = document.getElementById("scoreHud");
  const streakEl = document.getElementById("streakHud");
  const timerEl = document.getElementById("timerHud");
  if(scoreEl) scoreEl.textContent = score;
  if(streakEl) streakEl.textContent = streak;
  if(timerEl){
    timerEl.textContent = timeLeft + "s";
    timerEl.classList.toggle("low", timeLeft <= 10);
  }
}

function renderGameOver(){
  clearSession();
  app.innerHTML = `
    <div class="card center">
      <div class="score-big">${score}</div>
      <div class="score-sub">points &middot; best streak ${bestStreak} &middot; ${round-1} question${round-1===1?'':'s'} seen</div>
      <div style="margin-top:20px">
        <button id="retryBtn">Play Again</button>
      </div>
    </div>
  `;
  document.getElementById("retryBtn").addEventListener("click", renderIntro);
}

renderIntro();
</script>
</body>
</html>
